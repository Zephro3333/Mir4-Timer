name: MIR4 Timer

on:
  schedule:
    - cron: "*/5 * * * *"   # 👈 mais seguro que * * * * *
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    env:
      WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show files (DEBUG)
        run: |
          ls -R

      - name: Run bot (DEBUG MODE)
        run: |
          python -u main.py
